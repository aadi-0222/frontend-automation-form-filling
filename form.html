<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automation Form Filling System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #dbeafe, #eff6ff, #f8fafc);
      min-height: 100vh;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #2563eb, #1d4ed8);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 15px;
      opacity: 0.95;
    }

    .form-section {
      padding: 30px;
      border-bottom: 1px solid #e5e7eb;
    }

    .form-section h2 {
      color: #1e3a8a;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .full-width {
      grid-column: span 2;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .upload-box {
      background: #f8fafc;
      border: 2px dashed #93c5fd;
      padding: 20px;
      border-radius: 15px;
    }

    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .btn-green {
      background: #16a34a;
    }

    .btn-green:hover {
      background: #15803d;
    }

    .button-area {
      text-align: center;
      padding: 30px;
    }

    .note {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
    }

    @media(max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Automation Form Filling System</h1>
      <p>Online Exam Registration Form + PDF Size Reducer + Compression</p>
    </div>

    <div class="form-section">
      <h2>Personal Details</h2>
      <div class="form-grid">
        <div>
          <label>Full Name</label>
          <input type="text" placeholder="Enter full name">
        </div>

        <div>
          <label>Email Address</label>
          <input type="email" placeholder="Enter email">
        </div>

        <div>
          <label>Mobile Number</label>
          <input type="tel" placeholder="Enter mobile number">
        </div>

        <div>
          <label>Date of Birth</label>
          <input type="date">
        </div>

        <div>
          <label>Gender</label>
          <select>
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label>Category</label>
          <select>
            <option>Select Category</option>
            <option>General</option>
            <option>OBC</option>
            <option>SC</option>
            <option>ST</option>
          </select>
        </div>

        <div class="full-width">
          <label>Address</label>
          <textarea rows="4" placeholder="Enter full address"></textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Education Details</h2>
      <div class="form-grid">
        <div>
          <label>Qualification</label>
          <input type="text" placeholder="B.Tech / BCA / MCA etc.">
        </div>

        <div>
          <label>University / College</label>
          <input type="text" placeholder="Enter college name">
        </div>

        <div>
          <label>Passing Year</label>
          <input type="number" placeholder="2025">
        </div>

        <div>
          <label>Percentage / CGPA</label>
          <input type="text" placeholder="Enter marks">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Document Upload</h2>
      <div class="form-grid">
        <div class="upload-box">
          <label>Upload Passport Photo</label>
          <input type="file">
        </div>

        <div class="upload-box">
          <label>Upload Signature</label>
          <input type="file">
        </div>

        <div class="upload-box full-width">
          <label>Upload Resume / Certificate PDF</label>
          <input type="file" accept="application/pdf">
          <p class="note">Supports PDF upload for exam registration</p>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>PDF Size Reducer & Compression</h2>
      <div class="upload-box">
        <label>Select PDF to Compress</label>
        <input type="file" accept="application/pdf">
        <p class="note">Reduce PDF size before final submission</p>
        <br>
        <button class="btn">Compress PDF</button>
      </div>
    </div>

    <div class="button-area">
      <button class="btn">Preview Form</button>
      <button class="btn btn-green">Final Submit</button>
    </div>
  </div>

</body>
</html>
